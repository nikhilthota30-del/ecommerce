{% extends "theme.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="container-fluid px-lg-5 mt-3">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex align-items-center gap-2 overflow-x-auto pb-2 no-scrollbar">
                <a href="{% url 'home' %}" class="btn btn-primary rounded-pill px-4 flex-shrink-0">
                    <i class="bi bi-grid-fill me-2"></i> All Products
                </a>
                {% for j in categories %}  
                <a href="/?category={{j.id}}" class="btn btn-white bg-white shadow-sm border rounded-pill px-4 flex-shrink-0 transition-hover">
                    {{j.name}}
                </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 gy-4"> 
                {% for i in products %} 
                <div class="col">
                    <div class="card h-100 border-0 shadow-sm transition-hover overflow-hidden">
                        <a href="{% url 'product_detail' i.id %}" class="text-decoration-none">
                            <div class="position-relative bg-white p-4" style="height: 220px;">
                                <img src="{{i.image.url}}" class="img-fluid w-100 h-100" alt="{{i.name}}" style="object-fit: contain;">
                            </div>
                        </a>
                        <div class="card-body px-3 pt-3">
                            <h6 class="card-title fw-bold mb-1 text-truncate">{{i.name}}</h6>
                            <p class="text-primary fw-bold mb-0">Rs: {{i.price}}/-</p>
                        </div>

                        <div class="card-footer bg-white border-0 px-3 pb-3 pt-2">
                            <div class="d-flex flex-column gap-2">
                                <div class="d-flex gap-2">
                                    <button type="button" value="{{ i.id }}" class="btn btn-outline-primary btn-sm flex-grow-1 rounded-pill fw-bold add-cart-btn">
                                        <i class="bi bi-cart-plus me-1"></i> Cart
                                    </button>
                                    
                                    <button type="button" value="{{ i.id }}" class="btn btn-primary btn-sm flex-grow-1 rounded-pill fw-bold book-now-btn">
                                        Book Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    // reusable function to add to cart
    function addToCart(productId, shouldRedirect) {
        $.ajax({
            type: 'POST',
            url: '{% url "cart_add" %}', 
            data: {
                product_id: productId,
                csrfmiddlewaretoken: '{{ csrf_token }}',
                action: 'post'
            },
            success: function (json) {
                // Update badge quantity
                var badge = document.getElementById("cart-qty");
                if (badge) { badge.textContent = json.qty; }

                if (shouldRedirect) {
                    // Redirect to cart summary page
                    window.location.href = "{% url 'cart_summary' %}"; 
                } else {
                    // Show just the alert if staying on page
                    Swal.fire({
                        title: 'Success!',
                        text: 'Product added to cart',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            },
            error: function (xhr, errmsg, err) {
                console.log("Error:", err);
            }
        });
    }

    // Listener for "Add to Cart"
    $(document).on('click', '.add-cart-btn', function (e) {
        e.preventDefault();
        addToCart($(this).val(), false);
    });

    // Listener for "Book Now"
    $(document).on('click', '.book-now-btn', function (e) {
        e.preventDefault();
        addToCart($(this).val(), true);
    });
</script>

<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .transition-hover { transition: all 0.3s ease; }
    .transition-hover:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.12) !important; }
    .card { border-radius: 20px; }
</style>
{% endblock %}
