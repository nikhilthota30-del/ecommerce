{% extends "theme.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="container py-5">
    <div class="row align-items-center">
        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm rounded-4 bg-white p-4" style="height: 450px;">
                <img src="{{ product.image.url }}" class="w-100 h-100" style="object-fit: contain;" alt="{{ product.name }}">
            </div>
        </div>

        <div class="col-md-6">
            <h1 class="display-5 fw-bold">{{ product.name }}</h1>
            <h3 class="text-primary fw-bold">Rs: {{ product.price }}/-</h3>
            <hr>

            <div class="mt-4">
                <h5 class="fw-bold">Product Details</h5>
                <div class="text-muted" style="font-size: 1.1rem; line-height: 1.8;">
                    {% if product.desc %}
                        {{ product.desc|linebreaks }}
                    {% else %}
                        <p>No description available for this item.</p>
                    {% endif %}
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex mt-5">
                <!-- <button type="button" value="{{ product.id }}" class="btn btn-outline-primary rounded-pill px-4 fw-bold add-cart-btn">
                    <i class="bi bi-cart-plus me-2"></i>Add to Cart
                </button> -->

                <button type="button" value="{{ product.id }}" class="btn btn-primary rounded-pill px-4 fw-bold book-now-btn">
                    <i class="bi bi-lightning-fill me-2"></i>Book Now
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $(document).on('click', '.add-cart-btn, .book-now-btn', function (e) {
        e.preventDefault();
        
        // Determine if we should redirect based on which button was clicked
        var isBookNow = $(this).hasClass('book-now-btn');
        var product_id = $(this).val();

        $.ajax({
            type: 'POST',
            url: '{% url "cart_add" %}', 
            data: {
                product_id: product_id,
                csrfmiddlewaretoken: '{{ csrf_token }}',
                action: 'post'
            },
            success: function (json) {
                // Update the global cart quantity badge if it exists
                var badge = document.getElementById("cart-qty");
                if (badge) {
                    badge.textContent = json.qty;
                }

                if (isBookNow) {
                    // Redirect to the cart page immediately
                    window.location.href = "{% url 'cart_summary' %}";
                } else {
                    // Just show a success notification
                    Swal.fire({
                        icon: 'success',
                        title: 'Added to cart!',
                        showConfirmButton: false,
                        timer: 1500,
                        toast: true,
                        position: 'top-end'
                    });
                }
            },
            error: function (xhr, errmsg, err) {
                console.log("Error:", err);
                alert("Could not add item to cart. Please try again.");
            }
        });
    });
</script>
{% endblock %}
